<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>Pagamento</title>
</h:head>
<h:body>
	<h1>Por favor, informe os dados do pagamento</h1>
	<h:form>
		<h:panelGrid columns="2">
			<h:outputLabel value="Valor:" for="valor" />
			<h:inputText value="#{pagamentoBean.pagamento.valor}" id="valor" />
				
			<h:outputLabel value="Cartão de crédito:" for="cartao" />
			<h:inputText id="cartao" value="#{pagamentoBean.pagamento.cartao}" />

			<h:outputLabel value="Data de validade (Mês/Ano):" for="data" />
			<h:inputText value="#{pagamentoBean.pagamento.validade}" id="data" />
		</h:panelGrid>
		<h:commandButton value="Pagar" action="/pagamento" />
		<h:messages />
	</h:form>
</h:body>
</html>
