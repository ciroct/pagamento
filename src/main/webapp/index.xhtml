<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<h:outputStylesheet library="css" name="styles.css" />
	<title>Pagamento</title> 
</h:head>
<h:body>
	<h1>Por favor, informe os dados do pagamento</h1>
	<h:form>
		<h:panelGrid columns="3">
			<h:outputLabel value="Valor:" for="valor" />
			<h:inputText value="#{pagamentoBean.pagamento.valor}" id="valor" 
			             name="valor" converterMessage="#{msgs.erroConversaoValor}"
			             required="true" requiredMessage="#{msgs.campoObrigatorio}">
				<f:convertNumber minFractionDigits="2" />
				<f:validateLongRange minimum="10" maximum="100000"/>
			</h:inputText>
			<h:message for="valor" styleClass="erro"/>
				
			<h:outputLabel value="Cartão de crédito:" for="cartao" name="cartão de crédito"/>
			<h:inputText id="cartao" value="#{pagamentoBean.pagamento.cartao}" 
			   validatorMessage="#{msgs.erroValidacaoCartao}"
			   required="true" requiredMessage="#{msgs.campoObrigatorio}">
				<f:validateLength minimum="16" />
			</h:inputText>
			<h:message for="cartao" styleClass="erro"/>

			<h:outputLabel value="Data de validade (Mês/Ano):" for="data" name="data de validade"/>
			<h:inputText value="#{pagamentoBean.pagamento.validade}" id="data" 
			   required="true" requiredMessage="#{msgs.campoObrigatorio}">
				<f:convertDateTime pattern="MM/yyyy" />
			</h:inputText>
			<h:message for="data" styleClass="erro"/>
			
		</h:panelGrid>
		<h:commandButton value="Pagar" action="/pagamento" />
		<h:commandButton value="Cancelar" action="/cancelamento" immediate="true"/>
	</h:form>
</h:body>
</html>
